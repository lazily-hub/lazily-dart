name: lazily
description: >-
  Lazy reactive primitives for Dart — Slots, Cells, and Signals with automatic
  dependency tracking and cache invalidation, plus the lazily-spec wire protocol
  for mirroring graph state across processes and languages. Pure Dart: Flutter,
  web, and native.
version: 0.19.0
repository: https://github.com/lazily-hub/lazily-dart
issue_tracker: https://github.com/lazily-hub/lazily-dart/issues
topics: [reactive, signals, reactive-programming, state, flutter]
environment:
  sdk: ^3.5.0
dev_dependencies:
  test: ^1.25.0
