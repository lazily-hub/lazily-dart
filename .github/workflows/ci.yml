name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Run every dart command from the package dir so the conformance tests'
        # sibling fixture path (`../lazily-spec/conformance/...`) resolves inside
        # the workspace.
        working-directory: lazily-dart
    strategy:
      fail-fast: false
      matrix:
        sdk: [stable, beta]
    steps:
      # Check out lazily-dart into a subdirectory so its sibling repos
      # (`../lazily-spec`, `../lazily-formal`) can live beside it in the
      # workspace — `actions/checkout` cannot write above `$GITHUB_WORKSPACE`.
      - name: Checkout lazily-dart
        uses: actions/checkout@v4
        with:
          path: lazily-dart
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      # Sibling lazily-spec so the conformance tests (statechart / message-passing
      # / distributed / collections) resolve `../lazily-spec/conformance/...`
      # fixtures that are not copied into `test/conformance/`.
      - name: Checkout lazily-spec (sibling)
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-spec
          path: lazily-spec

      # A checkout that succeeded but landed in the wrong place is invisible to
      # a skip-if-absent runner: the conformance tests would report green while
      # asserting nothing. Assert the sibling directories the tests actually
      # resolve, so the skip can never silently pass (#lzspecconf). Mirrors the
      # guard blocks in lazily-rs .github/workflows/ci.yml.
      - name: Assert canonical lazily-spec fixtures are present (#lzspecconf)
        run: |
          test -d ../lazily-spec/conformance || { echo "::error::../lazily-spec/conformance missing — the conformance tests would skip and report green"; exit 1; }
          # reactive-graph has NO bundled mirror under test/conformance/, so the
          # sibling is the only source: absent means the runner skips outright
          # and the async cascade fixture (c91a32a) goes unexecuted.
          test -d ../lazily-spec/conformance/reactive-graph || { echo "::error::../lazily-spec/conformance/reactive-graph missing — reactive_graph_conformance_test would skip and report green"; exit 1; }

      # Sibling lazily-formal Lean model so `dart test`'s formal_check_test builds
      # the proofs for real (instead of SKIP-ing). LAZILY_FORMAL_PATH points
      # tool/formal_check.dart at the checkout.
      - name: Checkout lazily-formal (sibling)
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-formal
          path: _lazily-formal

      - name: Install Lean (elan)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: _lazily-formal
          auto-config: false
          build: false
          test: false
          lint: false

      - run: dart pub get
      - run: dart analyze --fatal-infos
      - name: dart test (with lazily-formal proof verification)
        env:
          LAZILY_FORMAL_PATH: ${{ github.workspace }}/_lazily-formal
        run: dart test

  lean:
    name: Lean formal models (#lzleanformal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout canonical lazily-spec
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-spec
          path: lazily-spec

      - name: Checkout canonical lazily-formal
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-formal
          path: lazily-formal

      - name: Build lazily-spec IPC formal model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lazily-spec/formal/lean
          auto-config: false
          build: true
          test: false
          lint: false

      - name: Build lazily-formal reactive + state-chart model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lazily-formal
          auto-config: false
          build: true
          test: false
          lint: false
